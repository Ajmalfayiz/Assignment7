<!DOCTYPE html>
<html>

<head>
    <title>Simple Calculator</title>

    <!-- bootstrap css file -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- custom css file -->
    <link rel="stylesheet" href="css/styles.css">

</head>

<body>
    <!-- <div class="outerBox d-flex row"> -->
    <h2 class="fw-bold text-center text-primary m-4">Simple Calculator</h2>

    <div class="d-flex row justify-content-center gap-2">
        <input class="input1" type="text" name="inp1" id="num1" placeholder="Enter first number(X)">
        <input class="input1" type="text" name="inp2" id="num2" placeholder="Enter second number(Y)">

        <div class="d-flex row col-md-7 col-lg-7 justify-content-center  ">
            <button class="btns" onclick="add()">Add</button>
            <button class="btns" onclick="sub()">Subtract</button>
            <button class="btns" onclick="mul()">Multiply</button>
            <button class="btns" onclick="div()">Divide</button>

            <div class="d-flex row   justify-content-center my-4">

                <button class="sqBtn col-12 col-md-5" onclick="squareX()">Square (x²)</button>
                <button class="sqBtn col-12 col-md-5" onclick="squareY()">Square (y²)</button>


                <button class="cubeBtn col-12 col-md-5" onclick="cubeX()">Cube (x³)</button>
                <button class="cubeBtn col-12 col-md-5" onclick="cubeY()">Cube (y³)</button>
            </div>


            <h5 class="d-flex justify-content-center align-items-center result text-primary text-center my-4"
                id="result">Result: </h5>

        </div>

    </div>

    <script src="js/scripts.js"></script>
</body>

</html>
